name: Build

on:
  push:
    branches: [main]
    paths:
      - 'kernel/**'
      - 'ebpf/**'
      - 'daemon/**'
      - 'game/**'
      - 'cheats/**'
      - 'include/**'
      - 'Makefile'
  pull_request:
    branches: [main]
    paths:
      - 'kernel/**'
      - 'ebpf/**'
      - 'daemon/**'
      - 'game/**'
      - 'cheats/**'
      - 'include/**'
      - 'Makefile'

jobs:
  build-userspace:
    name: Build userspace components (ARM64 cross-compile)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libncurses-dev \
            libcurl4-openssl-dev \
            libyaml-dev

      - name: Build daemon
        run: make daemon CROSS_COMPILE=aarch64-linux-gnu- CC=aarch64-linux-gnu-gcc
        continue-on-error: true

      - name: Build game
        run: make game CROSS_COMPILE=aarch64-linux-gnu- CC=aarch64-linux-gnu-gcc
        continue-on-error: true

      - name: Build cheats
        run: make cheats CROSS_COMPILE=aarch64-linux-gnu- CC=aarch64-linux-gnu-gcc
        continue-on-error: true

  lint:
    name: Static analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shared header compiles cleanly
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -fsyntax-only \
            -Iinclude -xc - < include/owlbear_events.h

      - name: Verify event struct size
        run: |
          cat > /tmp/check_size.c << 'CEOF'
          #include "owlbear_events.h"
          int main(void) { return 0; }
          CEOF
          gcc -std=c11 -Wall -Werror -Iinclude -o /tmp/check_size /tmp/check_size.c
