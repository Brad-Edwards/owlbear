name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  INSTANCE_TAG: owlbear-graviton-dev

jobs:
  # -----------------------------------------------------------------------
  # Stage 1: Fast checks (no AWS, no ARM64 hardware)
  # -----------------------------------------------------------------------

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check shared header compiles
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -fsyntax-only \
            -Iinclude -xc - < include/owlbear_events.h

      - name: Verify event struct size
        run: |
          cat > /tmp/check_size.c << 'CEOF'
          #include "owlbear_events.h"
          int main(void) { return 0; }
          CEOF
          gcc -std=c11 -Wall -Werror -Iinclude -o /tmp/check_size /tmp/check_size.c

  cross-compile:
    name: ARM64 cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo dpkg --add-architecture arm64
          for f in /etc/apt/sources.list.d/ubuntu*.sources; do
            [ -f "$f" ] && sudo sed -i '/^Architectures:/d; /^Types:/a Architectures: amd64' "$f" 2>/dev/null || true
          done
          cat <<ARMSRC | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs) main universe
          deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs)-updates main universe
          ARMSRC
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libncurses-dev:arm64

      - name: Build game
        run: make game CROSS_COMPILE=aarch64-linux-gnu- CC=aarch64-linux-gnu-gcc

      - name: Build cheats
        run: make cheats CROSS_COMPILE=aarch64-linux-gnu- CC=aarch64-linux-gnu-gcc

  platform-tests:
    name: Platform tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install boto3

      - name: Run handler tests
        working-directory: platform/api
        run: python -m unittest tests.test_handler -v

  # -----------------------------------------------------------------------
  # Stage 2: Infrastructure
  # -----------------------------------------------------------------------

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::516608939870:role/owlbear-github-actions
          aws-region: us-east-2

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: deploy/terraform/environments/dev
        run: terraform init

      - name: Terraform Validate
        working-directory: deploy/terraform/environments/dev
        run: terraform validate

      - name: Terraform Plan
        working-directory: deploy/terraform/environments/dev
        run: terraform plan -no-color -out=tfplan

      - name: Upload Plan
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: deploy/terraform/environments/dev/tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: deploy/terraform/environments/dev
        run: terraform apply -auto-approve

  # -----------------------------------------------------------------------
  # Stage 3: Build on Graviton (main push only, after terraform)
  # -----------------------------------------------------------------------

  build-graviton:
    name: Build on Graviton3
    runs-on: ubuntu-latest
    needs: [lint, cross-compile, platform-tests, terraform]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::516608939870:role/owlbear-github-actions
          aws-region: us-east-2

      - name: Find Graviton instance
        id: find-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${INSTANCE_TAG}" \
                      "Name=instance-state-name,Values=running,stopped,stopping" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "::error::No Graviton instance found with tag Name=${INSTANCE_TAG}"
            exit 1
          fi

          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"
          echo "Found instance: ${INSTANCE_ID}"

      - name: Start instance if stopped
        env:
          INSTANCE_ID: ${{ steps.find-instance.outputs.instance_id }}
        run: |
          STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)

          echo "Instance state: ${STATE}"

          if [ "$STATE" = "stopped" ]; then
            echo "Starting instance..."
            aws ec2 start-instances --instance-ids "$INSTANCE_ID"
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
            echo "Instance running. Waiting for SSM agent..."
            sleep 30
          elif [ "$STATE" = "stopping" ]; then
            echo "Waiting for stop to complete..."
            aws ec2 wait instance-stopped --instance-ids "$INSTANCE_ID"
            aws ec2 start-instances --instance-ids "$INSTANCE_ID"
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
            sleep 30
          fi

      - name: Wait for SSM agent
        env:
          INSTANCE_ID: ${{ steps.find-instance.outputs.instance_id }}
        run: |
          echo "Waiting for SSM agent..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || echo "None")
            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent online."
              break
            fi
            echo "  Attempt ${i}/30: ${STATUS}"
            sleep 10
          done
          if [ "$STATUS" != "Online" ]; then
            echo "::error::SSM agent not online after 5 minutes"
            exit 1
          fi

      - name: Sync and build on Graviton
        id: build
        env:
          INSTANCE_ID: ${{ steps.find-instance.outputs.instance_id }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "owlbear CI: sync + build + unit tests" \
            --timeout-seconds 300 \
            --output-s3-bucket-name "owlbear-verification-artifacts" \
            --output-s3-key-prefix "ci-output" \
            --parameters commands='[
              "set -euo pipefail",
              "cd /home/ec2-user/owlbear",
              "chown -R ec2-user:ec2-user .",
              "echo === Git sync ===",
              "sudo -u ec2-user git fetch origin 2>&1",
              "sudo -u ec2-user git reset --hard origin/main 2>&1",
              "sudo -u ec2-user git log --oneline -1",
              "echo === Build eBPF ===",
              "sudo -u ec2-user make -C ebpf clean 2>&1 || true",
              "sudo -u ec2-user make -C ebpf 2>&1",
              "echo === Build kernel module ===",
              "make -C kernel clean 2>&1 || true",
              "make -C kernel 2>&1",
              "echo === Build userspace ===",
              "sudo -u ec2-user make daemon game cheats 2>&1",
              "echo === Unit tests ===",
              "sudo -u ec2-user make -C tests clean 2>&1 || true",
              "sudo -u ec2-user make -C tests unit 2>&1",
              "echo === BUILD OK ==="
            ]' \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "SSM Command: ${COMMAND_ID}"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success)
                echo "Build passed."
                break ;;
              Failed|TimedOut|Cancelled)
                echo "::error::Command ${STATUS}"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
                  --query 'StandardOutputContent' --output text 2>/dev/null || true
                echo "--- STDERR ---"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
                  --query 'StandardErrorContent' --output text 2>/dev/null || true
                exit 1 ;;
              *)
                if [ $((i % 6)) -eq 0 ]; then echo "  ${STATUS} ($((i*5))s)"; fi
                sleep 5 ;;
            esac
          done
          [ "$STATUS" = "Success" ] || { echo "::error::Timed out"; exit 1; }

      - name: Print build output
        if: always()
        env:
          INSTANCE_ID: ${{ steps.find-instance.outputs.instance_id }}
          COMMAND_ID: ${{ steps.build.outputs.command_id }}
        run: |
          if [ -n "${COMMAND_ID:-}" ]; then
            echo "=== STDOUT ==="
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query 'StandardOutputContent' --output text 2>/dev/null || echo "(empty)"
            echo ""
            echo "=== STDERR ==="
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query 'StandardErrorContent' --output text 2>/dev/null || echo "(empty)"
          fi
