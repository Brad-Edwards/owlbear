name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'
      - 'platform/**'
  pull_request:
    branches: [main]
    paths:
      - 'deploy/**'
      - 'platform/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  TF_DIR: deploy/terraform/environments/dev

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::516608939870:role/owlbear-github-actions
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: deploy/terraform/environments/dev
        run: terraform init

      - name: Terraform Validate
        working-directory: deploy/terraform/environments/dev
        run: terraform validate

      - name: Terraform Plan
        working-directory: deploy/terraform/environments/dev
        run: terraform plan -no-color -out=tfplan

      - name: Upload Plan
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: deploy/terraform/environments/dev/tfplan

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::516608939870:role/owlbear-github-actions
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: deploy/terraform/environments/dev
        run: terraform init

      - name: Terraform Apply
        working-directory: deploy/terraform/environments/dev
        run: terraform apply -auto-approve

  test-platform:
    name: Platform Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install boto3

      - name: Run handler tests
        working-directory: platform/api
        run: python -m unittest tests.test_handler -v
