name: Verify on Graviton

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  INSTANCE_TAG: owlbear-graviton-dev

jobs:
  verify-graviton:
    name: E2E Verification on Graviton3
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::516608939870:role/owlbear-github-actions
          aws-region: us-east-2

      - name: Find Graviton instance
        id: find-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${INSTANCE_TAG}" \
                      "Name=instance-state-name,Values=running,stopped,stopping" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "::error::No Graviton instance found with tag Name=${INSTANCE_TAG}"
            exit 1
          fi

          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"
          echo "Found instance: ${INSTANCE_ID}"

      - name: Start instance if stopped
        env:
          INSTANCE_ID: ${{ steps.find-instance.outputs.instance_id }}
        run: |
          STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)

          echo "Instance state: ${STATE}"

          if [ "$STATE" = "stopped" ]; then
            echo "Starting instance..."
            aws ec2 start-instances --instance-ids "$INSTANCE_ID"
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
            echo "Instance started. Waiting for SSM agent..."
            sleep 30
          elif [ "$STATE" = "stopping" ]; then
            echo "Instance is stopping, waiting..."
            aws ec2 wait instance-stopped --instance-ids "$INSTANCE_ID"
            echo "Starting instance..."
            aws ec2 start-instances --instance-ids "$INSTANCE_ID"
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
            echo "Instance started. Waiting for SSM agent..."
            sleep 30
          fi

      - name: Wait for SSM agent
        env:
          INSTANCE_ID: ${{ steps.find-instance.outputs.instance_id }}
        run: |
          echo "Waiting for SSM agent to come online..."

          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || echo "None")

            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent is online."
              break
            fi

            echo "  Attempt ${i}/30: SSM status=${STATUS}"
            sleep 10
          done

          if [ "$STATUS" != "Online" ]; then
            echo "::error::SSM agent not online after 5 minutes"
            exit 1
          fi

      - name: Sync code, build, and run E2E verification
        id: verify
        env:
          INSTANCE_ID: ${{ steps.find-instance.outputs.instance_id }}
        run: |
          # Send the build + verify command via SSM
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "owlbear v1.0.0 E2E verification" \
            --timeout-seconds 600 \
            --parameters commands='[
              "set -euo pipefail",
              "cd /home/ec2-user/owlbear",
              "echo === Git sync ===",
              "sudo -u ec2-user git fetch origin",
              "sudo -u ec2-user git reset --hard origin/main",
              "echo === Build eBPF ===",
              "sudo -u ec2-user make -C ebpf clean",
              "sudo -u ec2-user make -C ebpf",
              "echo === Build userspace ===",
              "sudo -u ec2-user make daemon game cheats",
              "echo === Build kernel module ===",
              "make -C kernel clean || true",
              "make -C kernel",
              "echo === Run unit tests ===",
              "sudo -u ec2-user make -C tests clean",
              "sudo -u ec2-user make -C tests unit",
              "echo === Run E2E verification ===",
              "scripts/verify.sh --upload"
            ]' \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "SSM Command ID: ${COMMAND_ID}"

          # Poll for completion
          echo "Waiting for command to complete..."
          for i in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            case "$STATUS" in
              Success)
                echo "Command completed successfully."
                break
                ;;
              Failed|TimedOut|Cancelled)
                echo "::error::Command ${STATUS}"
                # Print output before failing
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardOutputContent' \
                  --output text 2>/dev/null || true
                echo "--- STDERR ---"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardErrorContent' \
                  --output text 2>/dev/null || true
                exit 1
                ;;
              *)
                if [ $((i % 6)) -eq 0 ]; then
                  echo "  Status: ${STATUS} (elapsed $((i * 5))s)"
                fi
                sleep 5
                ;;
            esac
          done

          if [ "$STATUS" != "Success" ]; then
            echo "::error::Command timed out waiting for completion"
            exit 1
          fi

      - name: Print verification output
        if: always()
        env:
          INSTANCE_ID: ${{ steps.find-instance.outputs.instance_id }}
          COMMAND_ID: ${{ steps.verify.outputs.command_id }}
        run: |
          if [ -n "$COMMAND_ID" ]; then
            echo "=== STDOUT ==="
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardOutputContent' \
              --output text 2>/dev/null || echo "(no stdout)"

            echo ""
            echo "=== STDERR ==="
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardErrorContent' \
              --output text 2>/dev/null || echo "(no stderr)"
          fi
